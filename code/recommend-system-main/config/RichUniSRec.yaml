n_layers: 3
n_heads: 4
hidden_size: 300
inner_size: 512
hidden_dropout_prob: 0.3
attn_dropout_prob: 0.3
hidden_act: 'gelu'
layer_norm_eps: 1e-12
learning_rate: 0.0001
initializer_range: 0.02
loss_type: 'CE'

item_drop_ratio: 0.15
item_drop_coefficient: 0.95
lambda: 1e-3

plm_suffix: blair-roberta-base.feature
struct_suffix: rich-item-struct.npy
train_stage: inductive_ft
plm_size: 768
adaptor_dropout_prob: 0.1
adaptor_layers: [768,300]
temperature: 0.05
n_exps: 8

use_rich_item_struct: true
use_user_history_features: true
rich_struct_embedding_size: 32
rich_user_feature_embedding_size: 32
rich_rating_bucket_num: 6
rich_time_gap_bucket_num: 10
rich_recency_bucket_num: 51

alias_of_item_id: [item_id_list]
load_col:
  inter: [user_id, item_id_list, rating_list, time_gap_list, recency_list, item_id]

learner: adamw
